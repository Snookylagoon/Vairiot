name: VairiotMobile
options:
  bundleIdPrefix: com.vairiot
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: VairiotMobile/Resources/Info.plist

targets:
  VairiotMobile:
    type: application
    platform: iOS
    sources:
      - VairiotMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vairiot.mobile
        INFOPLIST_FILE: VairiotMobile/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
        SWIFT_EMIT_LOC_STRINGS: true
    info:
      path: VairiotMobile/Resources/Info.plist
      properties:
        NSCameraUsageDescription: "Vairiot needs the camera to scan barcodes and QR codes on assets."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDisplayName: Vairiot
        ITSAppUsesNonExemptEncryption: false

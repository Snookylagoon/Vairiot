version: 2
updates:
  # npm workspaces (api, worker, web, admin, shared) share the root lockfile.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: pip
    directory: "/vairiot-reports"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  - package-ecosystem: gradle
    directory: "/vairiot-mobile"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: "/vairiot-api"
    schedule:
      interval: monthly

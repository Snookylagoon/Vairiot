name: Vairiot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Lint & type-check (JS/TS) ──────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (zero warnings policy)
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run TypeScript type-check
        run: npm run typecheck

  # ─── API tests ──────────────────────────────────────────────────────────────
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vairiot_test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vairiot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations (test DB)
        working-directory: vairiot-api
        env:
          DATABASE_URL: postgresql://vairiot_test:testpassword@localhost:5432/vairiot_test
        run: npx prisma migrate deploy

      - name: Run API tests
        working-directory: vairiot-api
        env:
          DATABASE_URL: postgresql://vairiot_test:testpassword@localhost:5432/vairiot_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-not-for-production
          NODE_ENV: test
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'

  # ─── Web tests ──────────────────────────────────────────────────────────────
  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run web tests
        working-directory: vairiot-web
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'

      - name: Build web app
        working-directory: vairiot-web
        run: npm run build

  # ─── Android lint (ktlint) ──────────────────────────────────────────────────
  lint-android:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Run Android lint
        working-directory: vairiot-mobile
        run: ./gradlew lint ktlintCheck

  # ─── Android unit tests ─────────────────────────────────────────────────────
  test-android:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    needs: lint-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Run Android unit tests
        working-directory: vairiot-mobile
        run: ./gradlew testDebugUnitTest

name: Vairiot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Node 24 (not the engines-floor 22) — Prisma 5.22's `prisma generate`
  # panics with "capacity overflow" during `npm ci` on Node 22 LTS runners.
  # Sidestepped here; revisit when bumping Prisma to 6.x.

  # ── Lint & type-check ─────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type-check (API)
        working-directory: vairiot-api
        run: npx tsc --noEmit

      - name: Run TypeScript type-check (Web)
        working-directory: vairiot-web
        run: npx tsc --noEmit

  # ── API tests ────────────────────────────────────────────────────────────────
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vairiot_test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vairiot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations (test DB)
        working-directory: vairiot-api
        env:
          DATABASE_URL: postgresql://vairiot_test:testpassword@localhost:5432/vairiot_test
        run: npx prisma migrate deploy

      - name: Run API tests
        working-directory: vairiot-api
        env:
          DATABASE_URL: postgresql://vairiot_test:testpassword@localhost:5432/vairiot_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-not-for-production
          NODE_ENV: test
        run: npx jest --runInBand --coverage

  # ── Android build + lint ─────────────────────────────────────────────────────
  android:
    name: Android Build & Lint
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('vairiot-mobile/**/*.gradle*', 'vairiot-mobile/**/gradle-wrapper.properties', 'vairiot-mobile/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: vairiot-mobile
        run: chmod +x ./gradlew

      - name: Android lint
        working-directory: vairiot-mobile
        run: ./gradlew lintDebug --no-daemon --stacktrace

      - name: Assemble debug APK
        working-directory: vairiot-mobile
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: vairiot-mobile/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  # ── Web tests ────────────────────────────────────────────────────────────────
  # Disabled until vairiot-web package is scaffolded (Sprint 5)
  # test-web:
  #   name: Web Tests
  #   runs-on: ubuntu-latest

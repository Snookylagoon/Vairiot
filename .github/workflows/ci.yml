name: Vairiot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Lint & type-check ─────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 22 LTS — matches the prod engines floor (Prisma 6 fixed the
      # generate panic that previously forced CI onto Node 24).
      - name: Set up Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # vairiot-shared is consumed via its compiled dist/ (main + types), which
      # is gitignored and has no prepare hook, so npm ci does NOT build it.
      # Build it before anything type-checks/lints the workspaces that import it,
      # otherwise: "Cannot find module 'vairiot-shared'".
      - name: Build shared package
        run: npm run build --workspace vairiot-shared

      - name: ESLint (errors fail the build)
        run: npm run lint

      - name: Type-check API
        working-directory: vairiot-api
        run: npx tsc --noEmit

      - name: Type-check Worker
        working-directory: vairiot-worker
        run: npx tsc --noEmit

      - name: Type-check Web
        working-directory: vairiot-web
        run: npx tsc --noEmit

      - name: Type-check Admin
        working-directory: vairiot-admin
        run: npx tsc --noEmit

      - name: Type-check Shared
        working-directory: vairiot-shared
        run: npx tsc --noEmit

  # ── API tests ────────────────────────────────────────────────────────────────
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    # Backstop: the suite runs in ~15s, but leaked handles used to hang jest
    # indefinitely (see --forceExit below). Fail fast if that ever regresses.
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vairiot_test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vairiot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Tests import services that import vairiot-shared — build its dist/ first.
      - name: Build shared package
        run: npm run build --workspace vairiot-shared

      - name: Run Prisma migrations (test DB)
        working-directory: vairiot-api
        env:
          DATABASE_URL: postgresql://vairiot_test:testpassword@localhost:5432/vairiot_test
        run: npx prisma migrate deploy

      - name: Run API tests
        working-directory: vairiot-api
        env:
          DATABASE_URL: postgresql://vairiot_test:testpassword@localhost:5432/vairiot_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-not-for-production-32ch
          APP_ENCRYPTION_KEY: ci-test-encryption-key-32-chars!!
          NODE_ENV: test
        # --forceExit: the suite leaks open handles (Prisma/Redis/BullMQ aren't
        # closed in teardown), so jest completes every test then never exits.
        # Follow-up: fix teardown so this isn't needed.
        run: npx jest --runInBand --coverage --forceExit

  # ── Docker images ────────────────────────────────────────────────────────────
  # Every service image must at least build on every PR; on pushes to main the
  # images are also published to GHCR so deploys can `docker compose pull`
  # instead of building on the prod box (instant rollback = previous tag).
  docker:
    name: Docker ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint-typecheck
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker, web, admin, reports]
        include:
          - service: reports
            context: vairiot-reports
    env:
      BUILD_CONTEXT: ${{ matrix.context || '.' }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GHCR repository names must be lowercase; the owner login can contain
      # capitals (e.g. "Snookylagoon"), which makes the tag invalid.
      - name: Lowercase image owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: vairiot-${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/vairiot-${{ matrix.service }}:latest
            ghcr.io/${{ steps.owner.outputs.value }}/vairiot-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── Android build + lint ─────────────────────────────────────────────────────
  android:
    name: Android Build & Lint
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('vairiot-mobile/**/*.gradle*', 'vairiot-mobile/**/gradle-wrapper.properties', 'vairiot-mobile/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: vairiot-mobile
        run: chmod +x ./gradlew

      - name: Android lint
        working-directory: vairiot-mobile
        run: ./gradlew lintDebug --no-daemon --stacktrace

      - name: Assemble debug APK
        working-directory: vairiot-mobile
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: vairiot-mobile/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

name: Vairiot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Lint & type-check (API only until web/worker packages exist) ─────────────
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type-check (API)
        working-directory: vairiot-api
        run: npx tsc --noEmit

  # ── API tests ────────────────────────────────────────────────────────────────
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vairiot_test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vairiot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations (test DB)
        working-directory: vairiot-api
        env:
          DATABASE_URL: postgresql://vairiot_test:testpassword@localhost:5432/vairiot_test
        run: npx prisma migrate deploy

      - name: Run API tests
        working-directory: vairiot-api
        env:
          DATABASE_URL: postgresql://vairiot_test:testpassword@localhost:5432/vairiot_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-not-for-production
          NODE_ENV: test
        run: npx jest --runInBand --coverage

  # ── Android lint ─────────────────────────────────────────────────────────────
  # Disabled until Android Studio project and Gradle wrapper are set up (Sprint 5)
  # lint-android:
  #   name: Android Lint
  #   runs-on: ubuntu-latest

  # ── Web tests ────────────────────────────────────────────────────────────────
  # Disabled until vairiot-web package is scaffolded (Sprint 5)
  # test-web:
  #   name: Web Tests
  #   runs-on: ubuntu-latest

services:

  postgres:
    image: postgres:16-alpine
    container_name: vairiot_postgres
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vairiot_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vairiot_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: vairiot-api/Dockerfile
    container_name: vairiot_api
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV:      production
      DATABASE_URL:  "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      REDIS_URL:     "redis://:${REDIS_PASSWORD}@redis:6379"
      JWT_SECRET:    ${JWT_SECRET}
      API_PORT:      3001
      WEB_ORIGIN:    ${WEB_ORIGIN}
      LOG_LEVEL:     info
      MINIO_ENDPOINT:         minio
      MINIO_PORT:             9000
      MINIO_USE_SSL:          "false"
      MINIO_ROOT_USER:        ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD:    ${MINIO_ROOT_PASSWORD}
      MINIO_PHOTOS_BUCKET:    vairiot-photos
      MINIO_DOCUMENTS_BUCKET: vairiot-documents
    expose:
      - "3001"

  web:
    build:
      context: ..
      dockerfile: vairiot-web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: vairiot_web
    restart: always
    depends_on:
      - api
    expose:
      - "80"

  worker:
    build:
      context: ..
      dockerfile: vairiot-worker/Dockerfile
    container_name: vairiot_worker
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV:     production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      REDIS_URL:    "redis://:${REDIS_PASSWORD}@redis:6379"
      LOG_LEVEL:    info

  nginx:
    image: nginx:alpine
    container_name: vairiot_nginx
    restart: always
    depends_on:
      - api
      - web
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — fallback for IP / unknown hostnames; drop connection silently
# ---------------------------------------------------------------------------
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/vai.vairiot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vai.vairiot.com/privkey.pem;

    return 444;
}

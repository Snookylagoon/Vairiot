# ---------------------------------------------------------------------------
# Docker's embedded DNS. Resolving upstreams at request time (via a variable in
# proxy_pass) means nginx picks up a container's NEW IP after a redeploy instead
# of caching the old one — this removes the "502 until nginx is manually
# restarted" failure mode that deploy.sh used to work around.
# ---------------------------------------------------------------------------
resolver 127.0.0.11 valid=10s ipv6=off;

# gzip — mobile clients pull JSON list responses over cellular; compress them.
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   5;
gzip_min_length   1024;
gzip_types        application/json application/javascript text/css text/plain
                  application/xml image/svg+xml application/vnd.api+json;

# ---------------------------------------------------------------------------
# HTTP — serves ACME challenge + redirects everything else to HTTPS.
# Anything that isn't a known vairiot.com hostname (e.g. the bare IP) is
# bounced to the main app domain so users land on a valid cert.
# ---------------------------------------------------------------------------
map $host $https_target {
    default                 "vai.vairiot.com";
    vai.vairiot.com         "vai.vairiot.com";
    vaiadmin.vairiot.com    "vaiadmin.vairiot.com";
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 200m;

    # Internal healthcheck endpoint (used by the nginx container HEALTHCHECK).
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$https_target$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — vai.vairiot.com → main app
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name vai.vairiot.com;

    client_max_body_size 200m;

    ssl_certificate     /etc/letsencrypt/live/vai.vairiot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vai.vairiot.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # HSTS — the SPA hosts previously had none (helmet only covered API responses).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;

    location /api/ {
        set $api_upstream http://api:3001;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream;
    }

    location / {
        set $web_upstream http://web:80;
        proxy_pass       $web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — vaiadmin.vairiot.com → admin SPA
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name vaiadmin.vairiot.com;

    client_max_body_size 200m;

    ssl_certificate     /etc/letsencrypt/live/vai.vairiot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vai.vairiot.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;

    location /api/ {
        set $api_upstream http://api:3001;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        set $admin_upstream http://admin:80;
        proxy_pass       $admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — fallback for IP / unknown hostnames; drop connection silently
# ---------------------------------------------------------------------------
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/vai.vairiot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vai.vairiot.com/privkey.pem;

    return 444;
}

upstream api {
    server api:3001;
}

upstream web {
    server web:80;
}

# HTTP server — serves ACME challenge + redirects everything else to HTTPS
server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Let's Encrypt challenge files (served from shared webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name _;

    client_max_body_size 10m;

    ssl_certificate     /etc/letsencrypt/live/81.85.92.155/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/81.85.92.155/privkey.pem;

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://api;
    }

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

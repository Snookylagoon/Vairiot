upstream api {
    server api:3001;
}

upstream web {
    server web:80;
}

upstream admin {
    server admin:80;
}

# ---------------------------------------------------------------------------
# HTTP — serves ACME challenge + redirects everything else to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — vai.vairiot.com → main app
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name vai.vairiot.com;

    client_max_body_size 10m;

    ssl_certificate     /etc/letsencrypt/live/vai.vairiot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vai.vairiot.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /api/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    location /health {
        proxy_pass http://api;
    }

    location / {
        proxy_pass       http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — vaiadmin.vairiot.com → admin SPA
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name vaiadmin.vairiot.com;

    client_max_body_size 10m;


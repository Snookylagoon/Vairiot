# HOST-nginx vhosts for Vairiot staging on a shared box (not used by the
# vairiot_nginx container). Install to /etc/nginx/sites-available/ and symlink
# into sites-enabled, then run `certbot --nginx -d test.vairiot.com -d
# testadmin.vairiot.com` — certbot adds the TLS blocks and HTTPS redirects.
#
# Upstreams come from infra/docker-compose.staging-shared.yml:
#   127.0.0.1:8301 → api    127.0.0.1:8302 → web    127.0.0.1:8303 → admin

server {
    listen 80;
    listen [::]:80;
    server_name test.vairiot.com;

    client_max_body_size 200m;

    location /api/ {
        proxy_pass         http://127.0.0.1:8301;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8301;
    }

    location / {
        proxy_pass       http://127.0.0.1:8302;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name testadmin.vairiot.com;

    client_max_body_size 200m;

    location /api/ {
        proxy_pass         http://127.0.0.1:8301;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass       http://127.0.0.1:8303;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

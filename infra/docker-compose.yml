services:

  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vairiot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-vairiot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-vairiot_dev}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vairiot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vairiot_redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── MinIO (S3-compatible file storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: vairiot_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-vairiot-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme-minio}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── API (Node.js / Express) ────────────────────────────────────────────────
  api:
    build:
      context: ../vairiot-api
      dockerfile: Dockerfile.dev
    container_name: vairiot_api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      reports:  { condition: service_healthy }
    environment:
      NODE_ENV:      development
      DATABASE_URL:  "postgresql://${POSTGRES_USER:-vairiot}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-vairiot_dev}"
      REDIS_URL:     "redis://redis:6379"
      JWT_SECRET:    ${JWT_SECRET:-dev-secret-replace-in-production}
      API_PORT:      3001
      LOG_LEVEL:     ${LOG_LEVEL:-debug}
      REPORT_SERVICE_URL: http://reports:8100
    command: sh -c "rm -f .env && npm run dev"
    volumes:
      - ../vairiot-api:/app
      - /app/node_modules
    ports:
      - "3001:3001"

  # ─── Web app (React / Vite) ──────────────────────────────────────────────────
  web:
    build:
      context: ../vairiot-web
      dockerfile: Dockerfile.dev
    container_name: vairiot_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ../vairiot-web:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  # ─── Report Service (Python / FastAPI) ────────────────────────────────────────
  reports:
    build:
      context: ../vairiot-reports
      dockerfile: Dockerfile.dev
    container_name: vairiot_reports
    restart: unless-stopped
    volumes:
      - ../vairiot-reports/app:/app/app
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Worker (BullMQ background jobs) ────────────────────────────────────────
  worker:
    build:
      context: ../vairiot-worker
      dockerfile: Dockerfile.dev
    container_name: vairiot_worker
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV:     development
      DATABASE_URL: "postgresql://${POSTGRES_USER:-vairiot}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-vairiot_dev}"
      REDIS_URL:    "redis://redis:6379"
      LOG_LEVEL:    ${LOG_LEVEL:-debug}
    volumes:
      - ../vairiot-worker:/app
      - /app/node_modules

  # ─── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vairiot_nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
